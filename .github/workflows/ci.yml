name: CI Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Added uvicorn and httpx to ensure the API can boot and be tested
        pip install black flake8 pytest pytest-cov uvicorn httpx requests

    # GATE 1: Formatting Check (Black)
    - name: Check Code Formatting
      run: black --check .

    # GATE 2: Static Analysis / Linting (Flake8)
    - name: Run Code Linter
      run: flake8 . --max-line-length=88 --extend-ignore=E203

    # GATE 3: Testing & Coverage (Must be >= 80%)
    - name: Run Tests & Check Coverage
      # --cov-fail-under=80 forces the pipeline to fail if coverage drops below 80%
      run: |
        pytest --cov=. --cov-report=term-missing --cov-fail-under=80

    # GATE 4: Boot API & Integration Tests
    - name: Boot API and Run Integration Tests
      run: |
        # 1. Start the FastAPI app in the background using the '&' operator
        uvicorn main:app --host 127.0.0.1 --port 8000 &
        
        # 2. Pause to give the server time to fully boot
        sleep 5
        
        # 3. Hit the server to confirm it is actively accepting connections
        curl --fail http://127.0.0.1:8000/docs || exit 1
        
        # 4. Run your integration/API tests
        # (If your integration tests are in a specific folder, change this to: pytest tests/integration/)
        pytest
