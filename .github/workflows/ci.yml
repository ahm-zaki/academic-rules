name: CI Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Installs your FastAPI dependencies
        pip install -r requirements.txt
        # Installs the specific CI tools you requested
        pip install black flake8 pytest pytest-cov

    # GATE 1: Formatting Check (Black)
    # The --check flag ensures Black only checks the files and fails if they aren't formatted, 
    # rather than trying to rewrite them mid-pipeline.
    - name: Check Code Formatting
      run: black --check .

    # GATE 2: Static Analysis / Linting (Flake8)
    # The flags prevent Flake8 from failing on Black's standard 88-character line limit.
    - name: Run Code Linter
      run: flake8 . --max-line-length=88 --extend-ignore=E203

    # GATE 3: Testing & Coverage (Pytest + Pytest-Cov)
    # --cov-report=term-missing shows you exactly which lines of code your tests missed in the Action logs.
    - name: Run Tests & Check Coverage
      run: |
        pytest --cov=. --cov-report=term-missing
